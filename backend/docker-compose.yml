# Backend stack: Postgres + MinIO + Spring app.
# Dev/test only. Data lives INSIDE the containers (no volumes), so it is wiped
# on `docker compose down`.
#
# The frontend runs from ../frontend/docker-compose.yml and joins the shared
# `locket-net` network below to reach the "app" service. Start this stack first.

services:
  db:
    image: postgres:17-alpine
    container_name: locket-db
    environment:
      POSTGRES_DB: locket
      POSTGRES_USER: locket
      POSTGRES_PASSWORD: locket
    ports:
      - "5432:5432"
    networks:
      - locket-net
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U locket -d locket"]
      interval: 5s
      timeout: 5s
      retries: 10

  minio:
    image: minio/minio:latest
    container_name: locket-minio
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    ports:
      - "9000:9000"   # S3 API
      - "9001:9001"   # Web console (http://localhost:9001, login minioadmin/minioadmin)
    networks:
      - locket-net

  app:
    build:
      context: .
    container_name: locket-app
    image: n3thanh/locket-app:latest
    depends_on:
      db:
        condition: service_healthy
      minio:
        condition: service_started
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/locket
      SPRING_DATASOURCE_USERNAME: locket
      SPRING_DATASOURCE_PASSWORD: locket
      # S3 / MinIO storage
      APP_S3_ENDPOINT: http://minio:9000
      APP_S3_REGION: us-east-1
      APP_S3_BUCKET: locket-moments
      APP_S3_ACCESS_KEY: minioadmin
      APP_S3_SECRET_KEY: minioadmin
      APP_S3_PATH_STYLE_ACCESS: "true"
    ports:
      - "8080:8080"
    networks:
      - locket-net

# Shared network so the frontend compose can reach the "app" service by name.
networks:
  locket-net:
    name: locket-net
